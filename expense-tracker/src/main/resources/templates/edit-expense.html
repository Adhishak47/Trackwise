<!-- edit-expense.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Expense</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="dark-mode">
<div class="container center-container">
    <div class="form-container">
        <h2 class="form-title">Edit record</h2>
        <form th:action="@{/expenses}" method="post" th:object="${expense}">
            <input type="hidden" name="_method" value="put" th:field="*{id}"/>

            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" th:field="*{type}" required>
                    <option value="INCOME"
                            th:selected="${expense.type != null && expense.type.name() == 'INCOME'}">
                        Income
                    </option>
                    <option value="EXPENSE"
                            th:selected="${expense.type == null || expense.type.name() == 'EXPENSE'}">
                        Expense
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" th:value="${#temporals.format(expense.date, 'yyyy-MM-dd')}" required />
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" th:field="*{description}" maxlength="100" required />
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" th:field="*{amount}" step="any" min="0.01" max="100000" required />
            </div>

            <div class="form-group">
                <label for="categoryId">Category</label>
                <select id="categoryId" th:field="*{categoryId}" required>
                    <option value="" disabled>Select Category</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}" th:selected="${category.id == expense.categoryId}"></option>
                </select>
            </div>

            <!-- Notes (optional) -->
            <div class="form-group">
                <label for="notes">Notes
                    <span style="color: #86868b; font-weight: 400;">(optional)</span>
                </label>
                <input type="text" id="notes" th:field="*{notes}"
                       maxlength="255" placeholder="Any additional details" />
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">Update</button>
                <a th:href="@{/}" class="cancel-btn">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    const typeSelect     = document.getElementById('type');
    const categorySelect = document.getElementById('categoryId');

    async function loadCategories(type) {
        if (!type) return;

        try {
            const response  = await fetch(`/api/categories?type=${type}`);
            const categories = await response.json();

            // The existing categoryId is embedded as a data attribute by Thymeleaf
            const selectedId = categorySelect.dataset.selectedId;

            categorySelect.innerHTML =
                '<option value="" disabled>Select category</option>';

            categories.forEach(cat => {
                const option       = document.createElement('option');
                option.value       = cat.id;
                option.textContent = cat.name;
                // Pre-select the category that was saved on this record
                if (String(cat.id) === String(selectedId)) option.selected = true;
                categorySelect.appendChild(option);
            });
        } catch (err) {
            categorySelect.innerHTML =
                '<option value="" disabled>Error loading categories</option>';
            console.error('Category load error:', err);
        }
    }

    // Reload list when type changes (user switching INCOME ↔ EXPENSE mid-edit)
    typeSelect.addEventListener('change', () => loadCategories(typeSelect.value));

    // Load immediately on page open using the current type value
    document.addEventListener('DOMContentLoaded', () => {
        loadCategories(typeSelect.value);
    });
</script>
</body>
</html>
